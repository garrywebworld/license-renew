<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Favicon -->
<link rel="icon" type="image/png" href="https://ik.imagekit.io/garrywebworld/garrywebworld.png">
<link rel="shortcut icon" href="https://ik.imagekit.io/garrywebworld/garrywebworld.png">
<link rel="apple-touch-icon" href="https://ik.imagekit.io/garrywebworld/garrywebworld.png">

<!-- Theme Color -->
<meta name="theme-color" content="#FFD000">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website License Renewal | Garry Web World</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#090909;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;

}

.container{

width:100%;
max-width:750px;
background:#111;
border:2px solid #FFD000;
border-radius:18px;
padding:40px;
box-shadow:0 0 35px rgba(255,208,0,.18);

}

.logo{

font-size:34px;
font-weight:800;
color:#FFD000;
text-align:center;

}

.subtitle{

text-align:center;
color:#ccc;
margin-top:8px;
margin-bottom:35px;

}

input,
select,
textarea{

width:100%;
padding:15px;
margin-bottom:18px;
background:#1b1b1b;
border:1px solid #333;
border-radius:10px;
color:#fff;
font-size:15px;

}

input:focus,
select:focus,
textarea:focus{

border-color:#FFD000;
outline:none;

}

textarea{

resize:vertical;
min-height:120px;

}

button{

width:100%;
padding:16px;
background:#FFD000;
border:none;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#ffe24a;

}

.footer{

margin-top:25px;
text-align:center;
font-size:13px;
color:#888;

}

.success{

display:none;
margin-top:20px;
padding:15px;
background:#0b6623;
border-radius:8px;
text-align:center;
color:#fff;

}

</style>

</head>
<body>

<div class="container">

<div class="logo">
Garry Web World
</div>

<div class="subtitle">
Website License Renewal Request
</div>

<form id="renewForm">

<input
type="text"
name="Website Name"
placeholder="Website Name"
required>

<input
type="text"
name="Website Domain"
placeholder="example.com"
required>

<input
type="text"
name="Owner Name"
placeholder="Owner Name"
required>

<input
type="email"
name="Email"
placeholder="Email Address"
required>

<input
type="tel"
name="Phone Number"
placeholder="Phone Number"
required>

<select name="Renewal Type" required>

<option value="">Select Renewal Type</option>

<option>Website License Renewal</option>

<option>Website Maintenance</option>

<option>Annual Support</option>

<option>Website Updates</option>

<option>Emergency Renewal</option>

</select>

<textarea
name="Message"
placeholder="Write your request..."></textarea>

<input
type="hidden"
name="Company"
value="Garry Web World">

<button type="submit">
Request License Renewal
</button>

</form>

<div class="success" id="success">

✅ Your request has been sent successfully.<br><br>

Our Lead Coder will contact you shortly.

</div>

<div class="footer">

© 2026 Garry Web World

</div>

</div>

<script>

const form=document.getElementById("renewForm");

form.addEventListener("submit",async function(e){

e.preventDefault();

const data=new FormData(form);

const response=await fetch("https://formspree.io/f/mlgqdypb",{

method:"POST",

body:data,

headers:{
'Accept':'application/json'
}

});

if(response.ok){

form.reset();

document.getElementById("success").style.display="block";

}

else{

alert("Unable to send request.");

}

});

</script>

</body>
</html>
